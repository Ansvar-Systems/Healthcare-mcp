name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: healthcare-mcp-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HEALTHCARE_UPSTREAM_EU_REGS_URL: ${{ secrets.HEALTHCARE_UPSTREAM_EU_REGS_URL }}
      HEALTHCARE_UPSTREAM_US_REGS_URL: ${{ secrets.HEALTHCARE_UPSTREAM_US_REGS_URL }}
      HEALTHCARE_UPSTREAM_SECURITY_CONTROLS_URL: ${{ secrets.HEALTHCARE_UPSTREAM_SECURITY_CONTROLS_URL }}
      HEALTHCARE_UPSTREAM_US_LAW_URL: ${{ secrets.HEALTHCARE_UPSTREAM_US_LAW_URL }}
      HEALTHCARE_UPSTREAM_EU_LAW_URL: ${{ secrets.HEALTHCARE_UPSTREAM_EU_LAW_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build and validate
        run: npm run test:ci

      - name: Require configured upstream MCP endpoints for release gating
        run: |
          if [ -z "${HEALTHCARE_UPSTREAM_EU_REGS_URL}${HEALTHCARE_UPSTREAM_US_REGS_URL}${HEALTHCARE_UPSTREAM_SECURITY_CONTROLS_URL}${HEALTHCARE_UPSTREAM_US_LAW_URL}${HEALTHCARE_UPSTREAM_EU_LAW_URL}" ]; then
            echo "Release gating requires configured upstream MCP endpoint secrets."
            exit 1
          fi

      - name: Run strict live authoritative regression
        run: npm run test:live:strict
        env:
          LIVE_UPSTREAM_TESTS: "1"
          LIVE_STRICT: "1"

      - name: Verify release metadata integrity
        run: npm run verify:release
        env:
          RELEASE_CHECK_NPM: "1"
          RELEASE_CHECK_STRICT: "1"

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
