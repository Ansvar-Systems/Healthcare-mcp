name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: healthcare-mcp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build database
        run: npm run build:db

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate drift hashes
        run: npm run drift:hashes

      - name: Verify drift hashes
        run: npm run drift:verify

      - name: Verify package contents
        run: npm pack --dry-run
